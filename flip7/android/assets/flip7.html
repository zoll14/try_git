  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0d1117;
    font-family: 'DM Mono', monospace;
  }

  .app {
    min-height: 100vh;
    background: radial-gradient(ellipse at 20% 0%, #1a2a1a 0%, #0d1117 60%);
    color: #e8e0d0;
    padding: 24px 16px 48px;
  }

  .header {
    text-align: center;
    margin-bottom: 32px;
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 52px;
    letter-spacing: 6px;
    color: #f5c842;
    text-shadow: 0 0 30px rgba(245,200,66,0.3);
    line-height: 1;
  }

  .logo span {
    color: #fff;
  }

  .subtitle {
    font-size: 11px;
    letter-spacing: 3px;
    color: #556;
    margin-top: 4px;
    text-transform: uppercase;
  }

  /* Setup */
  .setup-card {
    max-width: 420px;
    margin: 0 auto;
    background: #161b22;
    border: 1px solid #2a3040;
    border-radius: 12px;
    padding: 28px;
  }

  .setup-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 3px;
    color: #f5c842;
    margin-bottom: 20px;
  }

  .player-row {
    display: flex;
    gap: 8px;
    margin-bottom: 10px;
  }

  .input {
    background: #0d1117;
    border: 1px solid #2a3040;
    border-radius: 6px;
    color: #e8e0d0;
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    padding: 8px 12px;
    flex: 1;
    outline: none;
    transition: border-color 0.15s;
  }

  .input:focus { border-color: #f5c842; }
  .input::placeholder { color: #334; }

  .btn {
    background: none;
    border: 1px solid #2a3040;
    border-radius: 6px;
    color: #e8e0d0;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    padding: 8px 14px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .btn:hover { border-color: #556; background: #1e2530; }

  .btn-primary {
    background: #f5c842;
    border-color: #f5c842;
    color: #0d1117;
    font-weight: 500;
  }
  .btn-primary:hover { background: #ffd84a; border-color: #ffd84a; }

  .btn-danger { border-color: #e05; color: #e05; }
  .btn-danger:hover { background: rgba(238,0,85,0.1); }

  .btn-sm { padding: 5px 10px; font-size: 12px; }

  /* Game layout */
  .game-layout {
    max-width: 900px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  /* Scoreboard */
  .scoreboard {
    background: #161b22;
    border: 1px solid #2a3040;
    border-radius: 12px;
    overflow: hidden;
  }

  .table-wrap { overflow-x: auto; }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }

  th {
    background: #1e2530;
    padding: 10px 14px;
    text-align: center;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #778;
    border-bottom: 1px solid #2a3040;
    white-space: nowrap;
  }

  th.name-col { text-align: left; }

  th.name-col, td.name-col {
    position: sticky;
    left: 0;
    z-index: 2;
  }

  th.name-col {
    background: #1e2530;
  }

  td.name-col {
    background: #161b22;
  }

  tr:hover td.name-col {
    background: #1a2030;
  }

  .total-row td.name-col {
    background: #1e2530 !important;
  }

  td {
    padding: 9px 14px;
    text-align: center;
    border-bottom: 1px solid #1a2030;
    white-space: nowrap;
  }

  td.name-col {
    text-align: left;
    font-size: 14px;
    color: #e8e0d0;
  }

  tr:last-child td { border-bottom: none; }

  .score-cell { color: #aab; }
  .round-score { color: #e8e0d0; }
  .bust-cell { color: #e05; font-size: 11px; letter-spacing: 1px; }
  .flip7-cell { color: #f5c842; font-size: 11px; letter-spacing: 1px; }

  .total-row td {
    background: #1e2530;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 1px;
    color: #f5c842;
    border-top: 2px solid #2a3040;
  }

  .total-row td.name-col { color: #e8e0d0; font-size: 13px; letter-spacing: 2px; text-transform: uppercase; }

  .rank-badge {
    display: inline-block;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    font-size: 11px;
    line-height: 20px;
    text-align: center;
    margin-right: 6px;
    font-family: 'Bebas Neue', sans-serif;
  }

  .rank-1 { background: #f5c842; color: #0d1117; }
  .rank-2 { background: #aaa; color: #0d1117; }
  .rank-3 { background: #cd7f32; color: #0d1117; }

  /* Round entry */
  .round-panel {
    background: #161b22;
    border: 1px solid #2a3040;
    border-radius: 12px;
    padding: 24px;
  }

  .round-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }

  .round-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 3px;
    color: #e8e0d0;
  }

  .round-title span { color: #f5c842; }

  .players-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 14px;
    margin-bottom: 20px;
  }

  .player-entry {
    background: #0d1117;
    border: 1px solid #2a3040;
    border-radius: 8px;
    padding: 14px;
    transition: border-color 0.15s;
  }

  .player-entry.is-bust { border-color: rgba(238,0,85,0.3); }
  .player-entry.is-flip7 { border-color: rgba(245,200,66,0.4); }

  .player-entry-name {
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #778;
    margin-bottom: 10px;
  }

  .cards-input {
    width: 100%;
    margin-bottom: 10px;
  }

  .input-hint {
    font-size: 10px;
    color: #445;
    margin-bottom: 10px;
  }

  .toggle-row {
    display: flex;
    gap: 6px;
  }

  .toggle-btn {
    flex: 1;
    padding: 5px;
    font-size: 11px;
    letter-spacing: 1px;
    border-radius: 4px;
    cursor: pointer;
    border: 1px solid #2a3040;
    background: none;
    color: #778;
    font-family: 'DM Mono', monospace;
    transition: all 0.15s;
  }

  .toggle-btn.active-bust {
    background: rgba(238,0,85,0.15);
    border-color: #e05;
    color: #e05;
  }

  .toggle-btn.active-flip7 {
    background: rgba(245,200,66,0.15);
    border-color: #f5c842;
    color: #f5c842;
  }

  .preview-score {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    color: #f5c842;
    margin-top: 8px;
    letter-spacing: 2px;
  }

  .preview-score.bust { color: #e05; }

  .action-row {
    display: flex;
    gap: 10px;
    justify-content: flex-end;
    margin-top: 4px;
  }

  .divider {
    border: none;
    border-top: 1px solid #1e2530;
    margin: 16px 0;
  }

  .empty-state {
    text-align: center;
    padding: 40px;
    color: #334;
    font-size: 13px;
    letter-spacing: 1px;
  }
