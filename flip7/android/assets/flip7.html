    --score:     #888;
    --logo-glow: rgba(160,120,0,0.22);
    --grad-1:    #e8ede8;
    --grad-2:    #f4f1ec;
  }

  body {
    background: var(--bg);
    font-family: 'DM Mono', monospace;
    transition: background 0.2s;
  }

  .app {
    min-height: 100vh;
    background: radial-gradient(ellipse at 20% 0%, var(--grad-1) 0%, var(--grad-2) 60%);
    color: var(--text);
    padding: 24px 16px 48px;
    transition: background 0.2s, color 0.2s;
  }

  .header {
    text-align: center;
    margin-bottom: 32px;
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 52px;
    letter-spacing: 6px;
    color: var(--accent);
    text-shadow: 0 0 30px var(--logo-glow);
    line-height: 1;
  }

  .logo span { color: var(--text); }

  .subtitle {
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--text-2);
    margin-top: 4px;
    text-transform: uppercase;
  }

  .header-controls {
    display: flex;
    gap: 6px;
    justify-content: center;
    align-items: center;
    margin-top: 10px;
  }

  .ctrl-divider {
    width: 1px;
    height: 14px;
    background: var(--border);
  }

  .ctrl-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text-3);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    padding: 3px 10px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .ctrl-btn:hover { border-color: var(--border-2); color: var(--text-2); }

  .ctrl-btn.active {
    border-color: var(--accent);
    color: var(--accent);
  }

  .ctrl-btn.active:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  /* Setup */
  .setup-card {
    max-width: 420px;
    margin: 0 auto;
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 28px;
  }

  .setup-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 3px;
    color: var(--accent);
    margin-bottom: 20px;
  }

  .player-row {
    display: flex;
    gap: 8px;
    margin-bottom: 10px;
  }

  .input {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    padding: 8px 12px;
    flex: 1;
    outline: none;
    transition: border-color 0.15s;
  }

  .input:focus { border-color: var(--accent); }
  .input::placeholder { color: var(--text-4); }

  .btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    padding: 8px 14px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .btn:hover { border-color: var(--border-2); background: var(--bg-3); }

  .btn-primary {
    background: var(--accent);
    border-color: var(--accent);
    color: var(--accent-on);
    font-weight: 500;
  }
  .btn-primary:hover { background: var(--accent-h); border-color: var(--accent-h); }

  .btn-danger { border-color: var(--danger); color: var(--danger); }
  .btn-danger:hover { background: var(--danger-a); }

  .btn-sm { padding: 5px 10px; font-size: 12px; }

  /* Game layout */
  .game-layout {
    max-width: 900px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  /* Scoreboard */
  .scoreboard {
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }

  .table-wrap { overflow-x: auto; }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }

  th {
    background: var(--bg-3);
    padding: 10px 14px;
    text-align: center;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-2);
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }

  th.name-col { text-align: left; }

  th.name-col, td.name-col {
    position: sticky;
    left: 0;
    z-index: 2;
  }

  th.name-col { background: var(--bg-3); }
  td.name-col { background: var(--bg-2); }
  tr:hover td.name-col { background: var(--bg-4); }
  .total-row td.name-col { background: var(--bg-3) !important; }

  td {
    padding: 9px 14px;
    text-align: center;
    border-bottom: 1px solid var(--bg-4);
    white-space: nowrap;
  }

  td.name-col {
    text-align: left;
    font-size: 14px;
    color: var(--text);
  }

  tr:last-child td { border-bottom: none; }

  .score-cell  { color: var(--score); }
  .round-score { color: var(--text); }
  .bust-cell   { color: var(--danger); font-size: 11px; letter-spacing: 1px; }
  .flip7-cell  { color: var(--accent); font-size: 11px; letter-spacing: 1px; }

  .total-row td {
    background: var(--bg-3);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 1px;
    color: var(--accent);
    border-top: 2px solid var(--border);
  }

  .total-row td.name-col {
    color: var(--text);
    font-size: 13px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .total-score {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    color: var(--accent);
    letter-spacing: 1px;
  }

  .rank-badge {
    display: inline-block;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    font-size: 11px;
    line-height: 20px;
    text-align: center;
    margin-right: 6px;
    font-family: 'Bebas Neue', sans-serif;
  }

  .rank-1 { background: #f5c842; color: #0d1117; }
  .rank-2 { background: #aaa;    color: #0d1117; }
  .rank-3 { background: #cd7f32; color: #0d1117; }

  /* Round entry */
  .round-panel {
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
  }

  .round-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 20px;
  }

  .round-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 3px;
    color: var(--text);
    flex-shrink: 0;
  }

  .round-title span { color: var(--accent); }

  .players-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 14px;
    margin-bottom: 20px;
  }

  .player-entry {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px;
    transition: border-color 0.15s;
  }

  .player-entry.is-bust  { border-color: var(--danger-c); }
  .player-entry.is-flip7 { border-color: var(--flip-b); }

  .player-entry-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }

  .player-entry-name {
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-2);
  }

  .btn-camera {
    background: none;
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text-3);
    font-size: 15px;
    padding: 2px 8px;
    cursor: pointer;
    line-height: 1.5;
    transition: all 0.15s;
  }
  .btn-camera:hover    { border-color: var(--border-2); color: var(--text-2); background: var(--bg-3); }
  .btn-camera:disabled { opacity: 0.25; cursor: not-allowed; }

  .cards-input { width: 100%; margin-bottom: 4px; }

  .input-hint  { font-size: 10px; color: var(--text-3); margin-bottom: 6px; }

  .input-error { font-size: 10px; color: var(--danger); margin-bottom: 8px; min-height: 14px; }

  .input.invalid { border-color: var(--danger); }

  .toggle-row { display: flex; gap: 6px; }

  .toggle-btn {
    flex: 1;
    padding: 5px;
    font-size: 11px;
    letter-spacing: 1px;
    border-radius: 4px;
    cursor: pointer;
    border: 1px solid var(--border);
    background: none;
    color: var(--text-2);
    font-family: 'DM Mono', monospace;
    transition: all 0.15s;
  }

  .toggle-btn.active-bust {
    background: var(--danger-b);
    border-color: var(--danger);
    color: var(--danger);
  }

  .toggle-btn.active-flip7 {
    background: var(--flip-a);
    border-color: var(--accent);
    color: var(--accent);
  }

  .toggle-btn.active-x2 {
    background: var(--info-a);
    border-color: var(--info);
    color: var(--info);
  }

  .preview-score {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    color: var(--accent);
    margin-top: 8px;
    letter-spacing: 2px;
  }

  .preview-score.bust { color: var(--danger); }

  .preview-detail {
    font-size: 11px;
    color: var(--text-2);
    margin-left: 8px;
    font-family: 'DM Mono', monospace;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .scan-overlay {
    position: fixed;
    inset: 0;
    background: var(--bg-scan);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 200;
    gap: 20px;
  }

  .scan-spinner {
    width: 44px;
    height: 44px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  .scan-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 4px;
    color: var(--accent);
  }

  .action-row     { display: flex; flex-direction: column; gap: 10px; margin-top: 4px; }
  .action-add-row { display: flex; gap: 10px; }

  .btn-confirm {
    width: 100%;
    padding: 13px;
    font-size: 14px;
    letter-spacing: 2px;
  }

  .divider {
    border: none;
    border-top: 1px solid var(--bg-3);
    margin: 16px 0;
  }

  .empty-state {
    text-align: center;
    padding: 40px;
    color: var(--text-4);
    font-size: 13px;
    letter-spacing: 1px;
  }

  /* Dialog */
  .dialog-overlay {
    position: fixed;
    inset: 0;
    background: var(--bg-overlay);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 24px;
  }

  .dialog-box {
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 28px 24px 20px;
    max-width: 320px;
    width: 100%;
  }

  .dialog-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 3px;
    color: var(--accent);
    margin-bottom: 12px;
  }

  .dialog-msg  { font-size: 14px; color: var(--text); line-height: 1.6; margin-bottom: 20px; }
  .dialog-desc { font-size: 11px; color: var(--text-3); margin-bottom: 14px; }
  .dialog-btns { display: flex; gap: 10px; justify-content: flex-end; }
